<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Info (Demo)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
</head>

<body>
    <main>
        <section class="card">
            <div class="img">
                <img src="ranbeer kapoor.jpg" alt="profile-img">
            </div>
            <div class="name">
                <h3>Shri Patil</h3>
                <span class="blue-tick"><i class="fa-solid fa-certificate"></i></span>
            </div>
            <div class="items">
                <p>Mern Stack Developer</p>
                <p> <span><i class="fa-solid fa-location-crosshairs"></i></span> Degloor, India</p>
                <p class="details">Building full-stack web apps/pages with MERN Stack </p>
            </div>
            <div class="buttons">
                <button><span class="cdn"><i class="fa-solid fa-baby"></i></span> 12</button>
                <button><span class="cdn"><i class="fa-solid fa-inbox"></i></span> 12</button>
                <button><span class="cdn"><i class="fa-solid fa-star"></i></span> 4.6</button>
            </div>
            <button class="follow">Follow +</button>
        </section>
    </main>
</body>

</html>
